<!DOCTYPE html>
<html>
<head>
    <title>Password Generator</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }

        .container{
            background:white;
            padding:30px;
            border-radius:15px;
            text-align:center;
            width:350px;
            box-shadow:0 0 15px rgba(0,0,0,0.3);
        }

        h2{
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            font-size:18px;
            text-align:center;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        button{
            padding:12px 20px;
            background:#4CAF50;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Password Generator</h2>

    <input type="text" id="password" readonly>

    <button onclick="generatePassword()">
        Generate Password
    </button>
</div>

<script>
function generatePassword(){

    let chars =
    "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";

    let password = "";

    for(let i=0;i<12;i++){
        let randomIndex =
        Math.floor(Math.random() * chars.length);

        password += chars[randomIndex];
    }

    document.getElementById("password").value = password;
}
</script>

</body>
</html>
