<!DOCTYPE html>
<html>
<head>
  <title>React Counter Application</title>

  <style>
    body{
  margin:0;
  background:#020814;
  font-family:Arial;
  color:white;
  text-align:center;
}

.container{
  width:800px;
  margin:20px auto;
}

h1{
  margin-top:20px;
}

#count{
  font-size:30px;
  margin:10px 0 40px;
}

button{
  width:350px;
  height:40px;
  margin:55px 0;
  font-size:20px;
  background:#19e6e6;
  border:5px solid green;
  color:red;
  cursor:pointer;
}
  </style>
</head>

<body>

  <div class="container">
    <h1>React Counter Application</h1>

    <div id="count">0</div>

    <button onclick="increment()">Increment</button>
    <br>

    <button onclick="decrement()">Decrement</button>
    <br>

    <button onclick="reset()">Reset</button>
  </div>

  <script>
    let count = 0;

    function updateCount(){
      document.getElementById("count").innerText = count;
    }

    function increment(){
      count++;
      updateCount();
    }

    function decrement(){
      count--;
      updateCount();
    }

    function reset(){
      count = 0;
      updateCount();
    }
  </script>

</body>
</html>
