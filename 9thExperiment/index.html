<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>

    <style>
        body{
    margin:0;
    background:#e5e5e5;
    font-family:Arial, sans-serif;
}

h1{
    text-align:center;
    margin:0;
    padding:20px;
}

.container{
    width:100vw;      /* Full screen width */
    height:80vh;      /* Large height */
    background:red;
    text-align:center;
    padding-top:30px;
    box-sizing:border-box;
}

.container h2{
    color:white;
    font-size:70px;
    margin-bottom:40px;
}

input{
    width:100%;
    height:35px;
    background:#444;
    border:none;
    color:white;
    font-size:18px;
    box-sizing:border-box;
    margin:20px 0;
}

button{
    background:aqua;
    color:gray;
    border:6px solid green;
    width:200px;
    height:35px;
    font-size:16px;

    position:relative;
    top:20px;
}
    </style>
</head>

<body>

    <h1>Output</h1>

    <div class="container">
        <h2>Registration Form</h2>

        <input type="text" placeholder="Enter Your Name">

        <input type="email" placeholder="Enter Your Email">

        <input type="password" placeholder="Enter Your Password">

        <button>Submit</button>
    </div>

</body>
</html>
