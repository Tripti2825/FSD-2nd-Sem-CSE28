<!DOCTYPE html>
<html>
<head>
    <title>Food Menu</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f8f8f8;
        }

        header{
            background:#ff5722;
            color:white;
            text-align:center;
            padding:20px;
            font-size:24px;
        }

        .menu{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
            gap:20px;
            padding:20px;
        }

        .card{
            background:white;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.05);
        }

        .card img{
            width:100%;
            height:180px;
            object-fit:cover;
        }

        .card-body{
            padding:15px;
            text-align:center;
        }

        .price{
            color:green;
            font-weight:bold;
            margin-top:5px;
        }

        button{
            margin-top:10px;
            padding:8px 12px;
            border:none;
            background:#ff5722;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            opacity:0.8;
        }
    </style>
</head>

<body>

<header>🍔 Online Food Menu</header>

<div class="menu">

    <div class="card">
        <img src="https://picsum.photos/id/1080/400/300">
        <div class="card-body">
            <h3>Burger</h3>
            <p class="price">₹120</p>
            <button onclick="order('Burger')">Order Now</button>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/id/292/400/300">
        <div class="card-body">
            <h3>Pizza</h3>
            <p class="price">₹250</p>
            <button onclick="order('Pizza')">Order Now</button>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/id/433/400/300">
        <div class="card-body">
            <h3>Pasta</h3>
            <p class="price">₹180</p>
            <button onclick="order('Pasta')">Order Now</button>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/id/225/400/300">
        <div class="card-body">
            <h3>Sandwich</h3>
            <p class="price">₹90</p>
            <button onclick="order('Sandwich')">Order Now</button>
        </div>
    </div>

</div>

<script>
function order(item){
    alert(item + " has been added to your order!");
}
</script>

</body>
</html>
