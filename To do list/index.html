<!DOCTYPE html>
<html>
<head>
    <title>To-Do List App</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .container{
            background:white;
            padding:20px;
            border-radius:10px;
            width:350px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
        }

        .input-area{
            display:flex;
            gap:10px;
        }

        input{
            flex:1;
            padding:10px;
            font-size:16px;
        }

        button{
            padding:10px 15px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
            border-radius:5px;
        }

        button:hover{
            opacity:0.8;
        }

        ul{
            list-style:none;
            padding:0;
            margin-top:20px;
        }

        li{
            background:#eee;
            padding:10px;
            margin-bottom:10px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-radius:5px;
        }

        .completed{
            text-decoration:line-through;
            color:gray;
        }

        .delete-btn{
            background:red;
            color:white;
            border:none;
            padding:5px 10px;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>To-Do List</h1>

    <div class="input-area">
        <input type="text" id="taskInput" placeholder="Enter a task">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>
